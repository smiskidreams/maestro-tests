appId: com.coffeemeetsbagel
---
- runFlow: ../states/at_birthday_or_relationship.yaml

# Select "Marriage" option
- extendedWaitUntil:
    visible:
      id: "com.coffeemeetsbagel:id/marriage"
    timeout: 10000

- tapOn:
    id: "com.coffeemeetsbagel:id/marriage"

- extendedWaitUntil:
    visible:
      id: "com.coffeemeetsbagel:id/onboarding__next"
    timeout: 10000

- assertVisible:
    id: "com.coffeemeetsbagel:id/onboarding__next"
- tapOn:
    id: "com.coffeemeetsbagel:id/onboarding__next"

- extendedWaitUntil:
    visible: "You hear that? It’s the sound of wedding bells from our hundreds of thousands of success stories. Let’s find your person together."
    timeout: 10000

# Intermediate screen
- assertVisible: "You hear that? It’s the sound of wedding bells from our hundreds of thousands of success stories. Let’s find your person together."
- tapOn:
    id: "com.coffeemeetsbagel:id/onboarding__next"

# Assert gender selection screen visible
- extendedWaitUntil:
    visible:
      id: "com.coffeemeetsbagel:id/gender_woman"
    timeout: 10000
- assertVisible:
    id: "com.coffeemeetsbagel:id/gender_woman"
- assertVisible:
    id: "com.coffeemeetsbagel:id/gender_man"