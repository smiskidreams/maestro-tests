appId: com.coffeemeetsbagel
---
- runFlow: ./at_education_school.yaml 

# Continue to job title screen
- extendedWaitUntil:
    visible:
      id: "com.coffeemeetsbagel:id/onboarding__next"
    timeout: 10000
- assertVisible:
    id: "com.coffeemeetsbagel:id/onboarding__next"
- tapOn:
    id: "com.coffeemeetsbagel:id/onboarding__next"

# Postcondition: job title screen
- extendedWaitUntil:
    visible: "What’s your job title?"
    timeout: 10000
    
- assertVisible: "What’s your job title?"

- extendedWaitUntil:
    visible: 
      id: "com.coffeemeetsbagel:id/text_input"
    timeout: 10000

# Confirm Next button exists
- extendedWaitUntil:
    visible: 
      id: com.coffeemeetsbagel:id/onboarding__next
    timeout: 10000